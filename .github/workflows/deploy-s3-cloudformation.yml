name: Deploy S3 via CloudFormation

on:
  push:
    paths:
      - 's3-bucket.yaml'
  workflow_dispatch:

jobs:
  deploy:
    name: Validate and deploy S3 bucket
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_ACCESS_KEY_ID: YOUR_AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: YOUR_AWS_SECRET_ACCESS_KEY
      AWS_REGION: ap-south-1
      S3_BUCKET_NAME: my-unique-bucket-name

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-south-1' }}

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template --template-body file://s3-bucket.yaml

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --stack-name my-s3-bucket-stack \
            --template-file s3-bucket.yaml \
            --parameter-overrides BucketName=${{ env.S3_BUCKET_NAME }} EnableVersioning=true BlockPublicAccess=true \
            --capabilities CAPABILITY_NAMED_IAM
